<svg viewBox="0 0 1240 640" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8A7458"/>
    </marker>
    <marker id="arrowClay" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#B85C36"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1240" height="640" fill="#F4ECDD"/>
  <rect x="0" y="0" width="1240" height="640" fill="none"/>

  <!-- title -->
  <text x="48" y="56" font-family="Georgia, 'Times New Roman', serif" font-size="13" letter-spacing="4" fill="#B85C36">CITIZENGUARD</text>
  <text x="48" y="92" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="bold" fill="#33291E">System Architecture</text>
  <text x="48" y="118" font-size="15" fill="#7A6A53">Untrusted citizen input is screened, verified against real data, and re-checked before any verdict is shown.</text>

  <!-- data source: OpenAQ -->
  <g>
    <ellipse cx="710" cy="172" rx="78" ry="16" fill="#F0E2C2" stroke="#C99A3C" stroke-width="2"/>
    <path d="M632,172 v40 a78,16 0 0 0 156,0 v-40" fill="#F0E2C2" stroke="#C99A3C" stroke-width="2"/>
    <ellipse cx="710" cy="172" rx="78" ry="16" fill="#F7EED6" stroke="#C99A3C" stroke-width="2"/>
    <text x="710" y="170" text-anchor="middle" font-size="14" font-weight="bold" fill="#6B5326">OpenAQ</text>
    <text x="710" y="190" text-anchor="middle" font-size="11" fill="#8A7458">real sensor data</text>
    <text x="710" y="206" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#A98E55">v3 API</text>
  </g>
  <line x1="710" y1="228" x2="710" y2="292" stroke="#C99A3C" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="724" y="266" font-size="11" font-style="italic" fill="#A98E55">RAG: retrieve readings</text>

  <!-- pipeline nodes (cy 340) -->
  <!-- N1 citizen -->
  <rect x="30" y="296" width="150" height="92" rx="11" fill="#FBF6EC" stroke="#D9C9AE" stroke-width="1.5"/>
  <circle cx="105" cy="324" r="11" fill="none" stroke="#7A6A53" stroke-width="1.6"/>
  <path d="M90,348 a15,15 0 0 1 30,0" fill="none" stroke="#7A6A53" stroke-width="1.6"/>
  <text x="105" y="372" text-anchor="middle" font-size="13" font-weight="bold" fill="#33291E">Citizen</text>

  <!-- N2 console -->
  <rect x="220" y="296" width="150" height="92" rx="11" fill="#FBF6EC" stroke="#D9C9AE" stroke-width="1.5"/>
  <text x="295" y="332" text-anchor="middle" font-size="14" font-weight="bold" fill="#33291E">Web Console</text>
  <text x="295" y="352" text-anchor="middle" font-size="11" fill="#7A6A53">Gradio UI</text>
  <text x="295" y="370" text-anchor="middle" font-size="11" fill="#7A6A53">report + chart</text>

  <!-- N3 guardian in -->
  <rect x="410" y="296" width="160" height="92" rx="11" fill="#F2DACE" stroke="#B85C36" stroke-width="2.2"/>
  <path d="M490,308 l13,5 v9 c0,8 -6,13 -13,16 c-7,-3 -13,-8 -13,-16 v-9 z" fill="#B85C36"/>
  <text x="490" y="352" text-anchor="middle" font-family="Consolas, monospace" font-size="9.5" letter-spacing="2" fill="#B85C36">GUARDIAN</text>
  <text x="490" y="370" text-anchor="middle" font-size="13" font-weight="bold" fill="#7A3A1E">Input Screening</text>

  <!-- N4 engine -->
  <rect x="620" y="296" width="180" height="92" rx="11" fill="#D7E5DC" stroke="#356859" stroke-width="2.2"/>
  <text x="710" y="330" text-anchor="middle" font-size="14" font-weight="bold" fill="#234A3B">Verification Engine</text>
  <text x="710" y="350" text-anchor="middle" font-size="11" fill="#3C6B58">LLM (Groq) + RAG</text>
  <text x="710" y="368" text-anchor="middle" font-size="11" fill="#3C6B58">judges report vs data</text>

  <!-- N5 guardian out -->
  <rect x="850" y="296" width="160" height="92" rx="11" fill="#F2DACE" stroke="#B85C36" stroke-width="2.2"/>
  <path d="M930,308 l13,5 v9 c0,8 -6,13 -13,16 c-7,-3 -13,-8 -13,-16 v-9 z" fill="#B85C36"/>
  <text x="930" y="352" text-anchor="middle" font-family="Consolas, monospace" font-size="9.5" letter-spacing="2" fill="#B85C36">GUARDIAN</text>
  <text x="930" y="370" text-anchor="middle" font-size="13" font-weight="bold" fill="#7A3A1E">Output Validation</text>

  <!-- N6 verdict -->
  <rect x="1050" y="296" width="160" height="92" rx="11" fill="#FBF6EC" stroke="#D9C9AE" stroke-width="1.5"/>
  <text x="1130" y="330" text-anchor="middle" font-size="14" font-weight="bold" fill="#33291E">Verdict</text>
  <text x="1130" y="350" text-anchor="middle" font-size="11" fill="#7A6A53">+ cited reading</text>
  <text x="1130" y="368" text-anchor="middle" font-size="11" fill="#7A6A53">+ chart</text>

  <!-- arrows between nodes -->
  <line x1="180" y1="342" x2="218" y2="342" stroke="#8A7458" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="370" y1="342" x2="408" y2="342" stroke="#8A7458" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="570" y1="342" x2="618" y2="342" stroke="#8A7458" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="800" y1="342" x2="848" y2="342" stroke="#8A7458" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1010" y1="342" x2="1048" y2="342" stroke="#8A7458" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- captions under guardian gates -->
  <text x="490" y="416" text-anchor="middle" font-size="11" fill="#9A6A4E">normalize &#8594; detect injection</text>
  <text x="490" y="432" text-anchor="middle" font-size="11" fill="#9A6A4E">blocks before any LLM call</text>
  <text x="930" y="416" text-anchor="middle" font-size="11" fill="#9A6A4E">schema + provenance check</text>
  <text x="930" y="432" text-anchor="middle" font-size="11" fill="#9A6A4E">rejects unprovable verdicts</text>

  <!-- block path note -->
  <rect x="410" y="468" width="160" height="58" rx="9" fill="#F4ECDD" stroke="#B85C36" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="490" y="492" text-anchor="middle" font-size="12" font-weight="bold" fill="#B85C36">BLOCKED</text>
  <text x="490" y="510" text-anchor="middle" font-size="10.5" fill="#9A6A4E">malicious input stops here</text>
  <path d="M490,388 v76" stroke="#B85C36" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrowClay)"/>

  <!-- legend -->
  <text x="48" y="592" font-family="Consolas, monospace" font-size="11" letter-spacing="1" fill="#7A6A53">LEGEND</text>
  <rect x="120" y="582" width="14" height="14" rx="3" fill="#F2DACE" stroke="#B85C36" stroke-width="1.5"/>
  <text x="142" y="593" font-size="12" fill="#5C4A36">Guardian (security layer)</text>
  <rect x="330" y="582" width="14" height="14" rx="3" fill="#D7E5DC" stroke="#356859" stroke-width="1.5"/>
  <text x="352" y="593" font-size="12" fill="#5C4A36">AI verification</text>
  <rect x="490" y="582" width="14" height="14" rx="3" fill="#F7EED6" stroke="#C99A3C" stroke-width="1.5"/>
  <text x="512" y="593" font-size="12" fill="#5C4A36">Real-world data</text>
  <rect x="650" y="582" width="14" height="14" rx="3" fill="#FBF6EC" stroke="#D9C9AE" stroke-width="1.5"/>
  <text x="672" y="593" font-size="12" fill="#5C4A36">Interface / output</text>
</svg>
