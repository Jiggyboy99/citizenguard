<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="d3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8A7458"/>
    </marker>
  </defs>

  <rect width="1000" height="700" fill="#F4ECDD"/>

  <text x="48" y="54" font-family="Georgia, 'Times New Roman', serif" font-size="13" letter-spacing="4" fill="#B85C36">CITIZENGUARD</text>
  <text x="48" y="90" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="bold" fill="#33291E">The Guardian: Defense in Depth</text>
  <text x="48" y="116" font-size="14" fill="#7A6A53">No single layer is trusted. An attack must pass every layer; the model sits protected in the middle.</text>

  <!-- detection stat badge -->
  <rect x="760" y="40" width="190" height="58" rx="10" fill="#356859"/>
  <text x="855" y="66" text-anchor="middle" font-size="13" fill="#CDE0D4">red-team detection</text>
  <text x="855" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#F4ECDD">85% (v2)</text>

  <!-- top: untrusted input -->
  <rect x="270" y="150" width="460" height="40" rx="8" fill="#F4ECDD" stroke="#9A6A4E" stroke-width="1.6" stroke-dasharray="5 4"/>
  <text x="500" y="175" text-anchor="middle" font-size="13" font-weight="bold" fill="#9A6A4E">UNTRUSTED INPUT &#183; citizen report</text>
  <line x1="500" y1="190" x2="500" y2="214" stroke="#8A7458" stroke-width="2" marker-end="url(#d3)"/>

  <!-- input layers (clay) -->
  <rect x="270" y="216" width="460" height="48" rx="8" fill="#F2DACE" stroke="#B85C36" stroke-width="2"/>
  <text x="500" y="240" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#7A3A1E">Layer 1 &#183; Input Normalization</text>
  <text x="500" y="257" text-anchor="middle" font-size="11" fill="#9A6A4E">lowercase &#183; un-space &#183; de-leetspeak &#183; base64 decode</text>
  <text x="752" y="244" font-size="11" fill="#9A6A4E">&#8592; catches obfuscation</text>

  <rect x="270" y="272" width="460" height="48" rx="8" fill="#F2DACE" stroke="#B85C36" stroke-width="2"/>
  <text x="500" y="296" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#7A3A1E">Layer 2 &#183; Pattern Detection</text>
  <text x="500" y="313" text-anchor="middle" font-size="11" fill="#9A6A4E">5 technique families &#183; override, role, extraction, verdict, format</text>
  <text x="752" y="300" font-size="11" fill="#9A6A4E">&#8592; catches known injection</text>

  <rect x="270" y="328" width="460" height="48" rx="8" fill="#F4ECDD" stroke="#B85C36" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="500" y="352" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#B85C36">Layer 3 &#183; LLM Intent Classifier</text>
  <text x="500" y="369" text-anchor="middle" font-size="11" fill="#9A6A4E">planned &#183; judges meaning, not spelling</text>
  <text x="752" y="356" font-size="11" fill="#9A6A4E">&#8592; catches paraphrase</text>

  <line x1="500" y1="376" x2="500" y2="398" stroke="#8A7458" stroke-width="2" marker-end="url(#d3)"/>

  <!-- center model -->
  <rect x="230" y="400" width="540" height="64" rx="10" fill="#D7E5DC" stroke="#356859" stroke-width="2.4"/>
  <text x="500" y="428" text-anchor="middle" font-size="15" font-weight="bold" fill="#234A3B">Verification Model</text>
  <text x="500" y="448" text-anchor="middle" font-size="11.5" fill="#3C6B58">LLM + real OpenAQ readings &#183; the protected core</text>

  <line x1="500" y1="464" x2="500" y2="486" stroke="#8A7458" stroke-width="2" marker-end="url(#d3)"/>

  <!-- output layers (ochre) -->
  <rect x="270" y="488" width="460" height="48" rx="8" fill="#F7EED6" stroke="#C99A3C" stroke-width="2"/>
  <text x="500" y="512" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#6B5326">Layer 4 &#183; Output Schema Check</text>
  <text x="500" y="529" text-anchor="middle" font-size="11" fill="#A98E55">verdict must be one of verified / unverified / unclear</text>
  <text x="752" y="516" font-size="11" fill="#A98E55">&#8592; catches malformed output</text>

  <rect x="270" y="544" width="460" height="48" rx="8" fill="#F7EED6" stroke="#C99A3C" stroke-width="2"/>
  <text x="500" y="568" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#6B5326">Layer 5 &#183; Output Provenance Check</text>
  <text x="500" y="585" text-anchor="middle" font-size="11" fill="#A98E55">cited reading must exist in the real data</text>
  <text x="752" y="572" font-size="11" fill="#A98E55">&#8592; catches hallucination</text>

  <line x1="500" y1="592" x2="500" y2="614" stroke="#8A7458" stroke-width="2" marker-end="url(#d3)"/>

  <!-- bottom: trusted -->
  <rect x="270" y="616" width="460" height="40" rx="8" fill="#356859"/>
  <text x="500" y="641" text-anchor="middle" font-size="13" font-weight="bold" fill="#F4ECDD">TRUSTED VERDICT &#183; with a real citation</text>

  <!-- left bracket labels -->
  <text x="150" y="276" text-anchor="middle" font-family="Consolas, monospace" font-size="11" letter-spacing="1" fill="#B85C36" transform="rotate(-90 150 276)">INPUT GUARD</text>
  <text x="150" y="544" text-anchor="middle" font-family="Consolas, monospace" font-size="11" letter-spacing="1" fill="#C99A3C" transform="rotate(-90 150 544)">OUTPUT GUARD</text>
</svg>
