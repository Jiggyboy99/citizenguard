<svg viewBox="0 0 960 760" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8A7458"/>
    </marker>
    <marker id="a2clay" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#B85C36"/>
    </marker>
    <marker id="a2ochre" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C99A3C"/>
    </marker>
  </defs>

  <rect width="960" height="760" fill="#F4ECDD"/>

  <text x="48" y="54" font-family="Georgia, 'Times New Roman', serif" font-size="13" letter-spacing="4" fill="#B85C36">CITIZENGUARD</text>
  <text x="48" y="90" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="bold" fill="#33291E">Request Lifecycle</text>
  <text x="48" y="116" font-size="14" fill="#7A6A53">What happens to a single report, including the two ways it can be stopped.</text>

  <!-- main column x center = 340, boxes width 360 -->
  <!-- step 1 -->
  <rect x="160" y="150" width="360" height="62" rx="10" fill="#FBF6EC" stroke="#D9C9AE" stroke-width="1.5"/>
  <circle cx="190" cy="181" r="13" fill="#33291E"/><text x="190" y="186" text-anchor="middle" font-size="13" font-weight="bold" fill="#F4ECDD">1</text>
  <text x="220" y="178" font-size="14" font-weight="bold" fill="#33291E">Citizen submits a report</text>
  <text x="220" y="196" font-size="11.5" fill="#7A6A53">free text + chosen location</text>

  <!-- step 2 guardian input (decision) -->
  <rect x="160" y="248" width="360" height="70" rx="10" fill="#F2DACE" stroke="#B85C36" stroke-width="2.2"/>
  <circle cx="190" cy="283" r="13" fill="#B85C36"/><text x="190" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#F4ECDD">2</text>
  <text x="220" y="278" font-size="14" font-weight="bold" fill="#7A3A1E">Guardian &#183; Input Screening</text>
  <text x="220" y="297" font-size="11.5" fill="#9A6A4E">normalize &#8594; detect injection &#8594; malicious?</text>

  <!-- branch: blocked -->
  <line x1="520" y1="283" x2="690" y2="283" stroke="#B85C36" stroke-width="2" marker-end="url(#a2clay)"/>
  <text x="556" y="275" font-size="11" font-weight="bold" fill="#B85C36">YES</text>
  <rect x="690" y="256" width="210" height="54" rx="10" fill="#F4ECDD" stroke="#B85C36" stroke-width="1.8" stroke-dasharray="5 4"/>
  <text x="795" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#B85C36">BLOCKED</text>
  <text x="795" y="298" text-anchor="middle" font-size="10.5" fill="#9A6A4E">no LLM call is made</text>

  <line x1="340" y1="318" x2="340" y2="356" stroke="#8A7458" stroke-width="2" marker-end="url(#a2)"/>
  <text x="352" y="342" font-size="11" font-weight="bold" fill="#5C7A4A">NO &#8595;</text>

  <!-- step 3 retrieve -->
  <rect x="160" y="356" width="360" height="62" rx="10" fill="#F7EED6" stroke="#C99A3C" stroke-width="2"/>
  <circle cx="190" cy="387" r="13" fill="#C99A3C"/><text x="190" y="392" text-anchor="middle" font-size="13" font-weight="bold" fill="#F4ECDD">3</text>
  <text x="220" y="384" font-size="14" font-weight="bold" fill="#6B5326">Retrieve real readings</text>
  <text x="220" y="402" font-size="11.5" fill="#A98E55">OpenAQ sensors near the location (RAG)</text>

  <line x1="340" y1="418" x2="340" y2="448" stroke="#8A7458" stroke-width="2" marker-end="url(#a2)"/>

  <!-- step 4 verify -->
  <rect x="160" y="448" width="360" height="62" rx="10" fill="#D7E5DC" stroke="#356859" stroke-width="2.2"/>
  <circle cx="190" cy="479" r="13" fill="#356859"/><text x="190" y="484" text-anchor="middle" font-size="13" font-weight="bold" fill="#F4ECDD">4</text>
  <text x="220" y="476" font-size="14" font-weight="bold" fill="#234A3B">LLM verifies report vs data</text>
  <text x="220" y="494" font-size="11.5" fill="#3C6B58">returns verdict + reasoning + citation</text>

  <line x1="340" y1="510" x2="340" y2="548" stroke="#8A7458" stroke-width="2" marker-end="url(#a2)"/>

  <!-- step 5 guardian output (decision) -->
  <rect x="160" y="548" width="360" height="70" rx="10" fill="#F2DACE" stroke="#B85C36" stroke-width="2.2"/>
  <circle cx="190" cy="583" r="13" fill="#B85C36"/><text x="190" y="588" text-anchor="middle" font-size="13" font-weight="bold" fill="#F4ECDD">5</text>
  <text x="220" y="578" font-size="14" font-weight="bold" fill="#7A3A1E">Guardian &#183; Output Validation</text>
  <text x="220" y="597" font-size="11.5" fill="#9A6A4E">valid verdict? cited reading is real?</text>

  <!-- branch: reject -> unclear -->
  <line x1="520" y1="583" x2="690" y2="583" stroke="#C99A3C" stroke-width="2" marker-end="url(#a2ochre)"/>
  <text x="556" y="575" font-size="11" font-weight="bold" fill="#C99A3C">NO</text>
  <rect x="690" y="556" width="210" height="54" rx="10" fill="#F7EED6" stroke="#C99A3C" stroke-width="1.8"/>
  <text x="795" y="580" text-anchor="middle" font-size="13" font-weight="bold" fill="#6B5326">UNCLEAR</text>
  <text x="795" y="598" text-anchor="middle" font-size="10.5" fill="#A98E55">downgraded, not trusted</text>

  <line x1="340" y1="618" x2="340" y2="656" stroke="#8A7458" stroke-width="2" marker-end="url(#a2)"/>
  <text x="352" y="642" font-size="11" font-weight="bold" fill="#5C7A4A">YES &#8595;</text>

  <!-- step 6 verdict -->
  <rect x="160" y="656" width="360" height="62" rx="10" fill="#356859" stroke="#234A3B" stroke-width="2"/>
  <circle cx="190" cy="687" r="13" fill="#F4ECDD"/><text x="190" y="692" text-anchor="middle" font-size="13" font-weight="bold" fill="#356859">6</text>
  <text x="220" y="684" font-size="14" font-weight="bold" fill="#F4ECDD">Trusted verdict returned</text>
  <text x="220" y="702" font-size="11.5" fill="#CDE0D4">verdict + citation + live chart</text>
</svg>
